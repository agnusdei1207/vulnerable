services:
  edge:
    image: reverse-pivot-lab:latest
    build: .
    environment:
      - PORT=3000
      - LAB_ROOT=/tmp/rev-pivot-lab
      - FLAG=FLAG{EDGE_REVERSE_PIVOT_6EC50A}
      - PIVOT_HOST=pivot-relay
      - PIVOT_PORT=8081
      - PIVOT_KEY=4edc28c7f5b9a1d6c3e07ab4
    ports:
      - "${EDGE_PORT:-4706}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - node
      - /lab/edge-server.js
    networks:
      - revpivot

  pivot-relay:
    image: reverse-pivot-relay-lab:latest
    build: .
    user: root
    environment:
      - PORT=8081
      - LAB_ROOT=/tmp/rev-pivot-lab
      - PIVOT_FLAG=FLAG{FINAL_PIVOT_STAGE_D28CEA}
      - PIVOT_FLAG_PATH=/tmp/rev-pivot-lab/pivot/final-flag.txt
      - PIVOT_KEY=4edc28c7f5b9a1d6c3e07ab4
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      edge:
        condition: service_started
    command:
      - /lab/pivot-entry.sh
    networks:
      - revpivot

networks:
  revpivot:
    driver: bridge
