version: "3.8"

services:
  postgres:
    image: postgres:18-alpine
    command: postgres -c max_connections=2000
    environment:
      - POSTGRES_USER=vulnuser
      - POSTGRES_PASSWORD=vulnpass
      - POSTGRES_DB=vulndb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vulnuser -d vulndb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - vuln-network

  sqli-bronze:
    build: ./app
    ports:
      - "10000:3000"
    environment:
      - DATABASE_URL=postgresql://vulnuser:vulnpass@postgres:5432/vulndb
      - SECRET_KEY=super_secret_key_12345
      - CHALLENGE_MODE=/sqli/bronze
      - FLAG=FLAG{SQLI_🥉_3PB52R}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vuln-network

  sqli-silver:
    build: ./app
    ports:
      - "10001:3000"
    environment:
      - DATABASE_URL=postgresql://vulnuser:vulnpass@postgres:5432/vulndb
