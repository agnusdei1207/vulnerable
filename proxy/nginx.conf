worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  upstream rbac-silver {
    server rbac-silver:3000;
  }

  upstream mfa-silver {
    server mfa-silver:3000;
  }

  upstream oauth-silver {
    server oauth-silver:3000;
  }

  upstream csrf-silver {
    server csrf-silver:3000;
  }

  upstream postmsg-silver {
    server postmsg-silver:3000;
  }

  upstream deser-silver {
    server deser-silver:3000;
  }

  upstream upload-silver {
    server upload-silver:3000;
  }

  upstream xxe-silver {
    server xxe-silver:3000;
  }

  upstream ssti-silver {
    server ssti-silver:3000;
  }

  upstream payment-silver {
    server payment-silver:3000;
  }

  upstream proto-silver {
    server proto-silver:3000;
  }

  upstream race-silver {
    server race-silver:3000;
  }

  upstream jwt-silver {
    server jwt-silver:3000;
  }

  upstream ssrf-silver {
    server ssrf-silver:3000;
  }

  upstream reverse-silver {
    server reverse-silver:3000;
  }

  upstream pivot-silver {
    server pivot-silver:3000;
  }

  upstream chain-silver {
    server chain-silver:3000;
  }

  upstream webshell-silver {
    server webshell-silver:3000;
  }

  upstream persist-silver {
    server persist-silver:3000;
  }

  upstream container-silver {
    server container-silver:3000;
  }

  server {
    listen 80;
    server_name _;

    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    location = / {
      root /usr/share/nginx/html;
      try_files /index.html =404;
    }

    location ^~ /rbac/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://rbac-silver;
    }

    location ^~ /mfa/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://mfa-silver;
    }

    location ^~ /oauth/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://oauth-silver;
    }

    location ^~ /csrf/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://csrf-silver;
    }

    location ^~ /postmsg/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://postmsg-silver;
    }

    location ^~ /deser/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
