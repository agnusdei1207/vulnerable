worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  upstream rbac-silver {
    server unix:/var/run/challenges/rbac-silver/rbac-silver.sock;
  }

  upstream mfa-silver {
    server unix:/var/run/challenges/mfa-silver/mfa-silver.sock;
  }

  upstream oauth-silver {
    server unix:/var/run/challenges/oauth-silver/oauth-silver.sock;
  }

  upstream csrf-silver {
    server unix:/var/run/challenges/csrf-silver/csrf-silver.sock;
  }

  upstream postmsg-silver {
    server unix:/var/run/challenges/postmsg-silver/postmsg-silver.sock;
  }

  upstream deser-silver {
    server unix:/var/run/challenges/deser-silver/deser-silver.sock;
  }

  upstream upload-silver {
    server unix:/var/run/challenges/upload-silver/upload-silver.sock;
  }

  upstream xxe-silver {
    server unix:/var/run/challenges/xxe-silver/xxe-silver.sock;
  }

  upstream ssti-silver {
    server unix:/var/run/challenges/ssti-silver/ssti-silver.sock;
  }

  upstream payment-silver {
    server unix:/var/run/challenges/payment-silver/payment-silver.sock;
  }

  upstream proto-silver {
    server unix:/var/run/challenges/proto-silver/proto-silver.sock;
  }

  upstream race-silver {
    server unix:/var/run/challenges/race-silver/race-silver.sock;
  }

  upstream jwt-silver {
    server unix:/var/run/challenges/jwt-silver/jwt-silver.sock;
  }

  upstream ssrf-silver {
    server unix:/var/run/challenges/ssrf-silver/ssrf-silver.sock;
  }

  upstream reverse-silver {
    server unix:/var/run/challenges/reverse-silver/reverse-silver.sock;
  }

  upstream pivot-silver {
    server unix:/var/run/challenges/pivot-silver/pivot-silver.sock;
  }

  upstream chain-silver {
    server unix:/var/run/challenges/chain-silver/chain-silver.sock;
  }

  upstream webshell-silver {
    server unix:/var/run/challenges/webshell-silver/webshell-silver.sock;
  }

  upstream persist-silver {
    server unix:/var/run/challenges/persist-silver/persist-silver.sock;
  }

  upstream container-silver {
    server unix:/var/run/challenges/container-silver/container-silver.sock;
  }

  server {
    listen 80;
    server_name _;

    location = /healthz {
      access_log off;
      return 200 "ok\n";
    }

    location = / {
      root /usr/share/nginx/html;
      try_files /index.html =404;
    }

    location ^~ /rbac/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://rbac-silver;
    }

    location ^~ /mfa/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://mfa-silver;
    }

    location ^~ /oauth/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://oauth-silver;
    }

    location ^~ /csrf/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://csrf-silver;
    }

    location ^~ /postmsg/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://postmsg-silver;
    }

    location ^~ /deser/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://deser-silver;
    }

    location ^~ /upload/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://upload-silver;
    }

    location ^~ /xxe/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://xxe-silver;
    }

    location ^~ /ssti/silver {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://ssti-silver;
    }

    location ^~ /payment/silver {
