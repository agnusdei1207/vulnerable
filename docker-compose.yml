      - sock_ssti_silver:/var/run/challenges/ssti-silver:ro
      - sock_payment_silver:/var/run/challenges/payment-silver:ro
      - sock_proto_silver:/var/run/challenges/proto-silver:ro
      - sock_race_silver:/var/run/challenges/race-silver:ro
