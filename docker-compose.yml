      - sock_persist_silver:/var/run/challenges/persist-silver:ro
      - sock_container_silver:/var/run/challenges/container-silver:ro
    networks:
      - web-network

  seed-rbac-silver:
    image: alpine:3.20
    command:
      - /bin/sh
      - -lc
      - mkdir -p "/var/run/challenges/rbac-silver" && chown 1000:1000 "/var/run/challenges/rbac-silver" && chmod 0777 "/var/run/challenges/rbac-silver"
    volumes:
      - sock_rbac_silver:/var/run/challenges/rbac-silver
    restart: "no"
    networks:
      - net_rbac_silver

  rbac-silver:
    image: luxora-challenge-base:latest
    build: ./app
    environment:
      - SECRET_KEY=super_secret_key_12345
      - DEBUG=true
      - CHALLENGE_MODE=/rbac/silver
      - HTB_DIFFICULTY=MEDIUM
      - CHALLENGE_POINTS=3
      - FLAG=FLAG{RBAC_ACCESS_ROLE_BYPASS_HTB_MEDIUM_3PTS_034B46}
      - SOCKET_PATH=/var/run/challenges/rbac-silver/rbac-silver.sock
    volumes:
      - sock_rbac_silver:/var/run/challenges/rbac-silver
    ports:
      - "4100:3000"
    depends_on:
      seed-rbac-silver:
        condition: service_completed_successfully
    networks:
      - net_rbac_silver

