services:
  web:
    build: ./proxy
    ports:
      - "9000:80"
    labels:
      - "dokploy.enable=true"
    volumes:
      - sock_rbac_silver:/var/run/challenges/rbac-silver:ro
      - sock_mfa_silver:/var/run/challenges/mfa-silver:ro
      - sock_oauth_silver:/var/run/challenges/oauth-silver:ro
      - sock_csrf_silver:/var/run/challenges/csrf-silver:ro
