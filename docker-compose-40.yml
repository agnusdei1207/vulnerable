services:
  web:
    build: ./proxy
    labels:
      - "dokploy.enable=true"
    volumes:
      - sock_admin_silver:/var/run/challenges/admin-silver:ro
      - sock_idor_silver:/var/run/challenges/idor-silver:ro
      - sock_privesc_silver:/var/run/challenges/privesc-silver:ro
      - sock_rbac_silver:/var/run/challenges/rbac-silver:ro
      - sock_multistage_silver:/var/run/challenges/multistage-silver:ro
      - sock_persist_silver:/var/run/challenges/persist-silver:ro
      - sock_reverse_silver:/var/run/challenges/reverse-silver:ro
      - sock_webshell_silver:/var/run/challenges/webshell-silver:ro
      - sock_brute_silver:/var/run/challenges/brute-silver:ro
      - sock_jwt_silver:/var/run/challenges/jwt-silver:ro
      - sock_mfa_silver:/var/run/challenges/mfa-silver:ro
      - sock_oauth_silver:/var/run/challenges/oauth-silver:ro
      - sock_clickjack_silver:/var/run/challenges/clickjack-silver:ro
      - sock_csrf_silver:/var/run/challenges/csrf-silver:ro
      - sock_postmsg_silver:/var/run/challenges/postmsg-silver:ro
      - sock_xss_silver:/var/run/challenges/xss-silver:ro
      - sock_info_disc_silver:/var/run/challenges/info-disc-silver:ro
      - sock_secret_silver:/var/run/challenges/secret-silver:ro
      - sock_timing_silver:/var/run/challenges/timing-silver:ro
      - sock_crypto_silver:/var/run/challenges/crypto-silver:ro
      - sock_deser_silver:/var/run/challenges/deser-silver:ro
      - sock_lfi_silver:/var/run/challenges/lfi-silver:ro
      - sock_upload_silver:/var/run/challenges/upload-silver:ro
      - sock_xxe_silver:/var/run/challenges/xxe-silver:ro
      - sock_container_silver:/var/run/challenges/container-silver:ro
      - sock_cors_silver:/var/run/challenges/cors-silver:ro
      - sock_host_silver:/var/run/challenges/host-silver:ro
      - sock_redirect_silver:/var/run/challenges/redirect-silver:ro
      - sock_cmdi_silver:/var/run/challenges/cmdi-silver:ro
      - sock_ldap_silver:/var/run/challenges/ldap-silver:ro
      - sock_nosqli_silver:/var/run/challenges/nosqli-silver:ro
      - sock_sqli_silver:/var/run/challenges/sqli-silver:ro
      - sock_ssti_silver:/var/run/challenges/ssti-silver:ro
      - sock_logic_silver:/var/run/challenges/logic-silver:ro
      - sock_payment_silver:/var/run/challenges/payment-silver:ro
      - sock_ratelimit_silver:/var/run/challenges/ratelimit-silver:ro
      - sock_proto_silver:/var/run/challenges/proto-silver:ro
      - sock_race_silver:/var/run/challenges/race-silver:ro
      - sock_smuggle_silver:/var/run/challenges/smuggle-silver:ro
      - sock_ssrf_silver:/var/run/challenges/ssrf-silver:ro
    networks:
      - web-network

  postgres:
    image: postgres:18-alpine
    command: postgres -c max_connections=2000
    environment:
      - POSTGRES_USER=vulnuser
      - POSTGRES_PASSWORD=vulnpass
      - POSTGRES_DB=vulndb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vulnuser -d vulndb']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - net_admin_silver
      - net_idor_silver
      - net_privesc_silver
      - net_rbac_silver
      - net_multistage_silver
      - net_persist_silver
      - net_reverse_silver
      - net_webshell_silver
      - net_brute_silver
      - net_jwt_silver
      - net_mfa_silver
      - net_oauth_silver
      - net_clickjack_silver
      - net_csrf_silver
      - net_postmsg_silver
      - net_xss_silver
      - net_info_disc_silver
      - net_secret_silver
      - net_timing_silver
      - net_crypto_silver
      - net_deser_silver
      - net_lfi_silver
      - net_upload_silver
      - net_xxe_silver
      - net_container_silver
      - net_cors_silver
      - net_host_silver
      - net_redirect_silver
      - net_cmdi_silver
      - net_ldap_silver
      - net_nosqli_silver
      - net_sqli_silver
      - net_ssti_silver
      - net_logic_silver
      - net_payment_silver
      - net_ratelimit_silver
      - net_proto_silver
      - net_race_silver
      - net_smuggle_silver
      - net_ssrf_silver

  seed-admin-silver:
    image: alpine:3.20
    command:
      - /bin/sh
      - -lc
      - mkdir -p "/var/run/challenges/admin-silver" && chown 1000:1000 "/var/run/challenges/admin-silver" && chmod 0777 "/var/run/challenges/admin-silver"
    volumes:
      - sock_admin_silver:/var/run/challenges/admin-silver
    restart: "no"
    networks:
      - net_admin_silver

  admin-silver:
    build: ./app
    environment:
      - DATABASE_URL=postgresql://vulnuser:vulnpass@postgres:5432/vulndb
      - SECRET_KEY=super_secret_key_12345
      - DEBUG=true
      - CHALLENGE_MODE=/admin/silver
      - FLAG=FLAG{ADMIN_🥈_ACCESS_620F3E}
      - SOCKET_PATH=/var/run/challenges/admin-silver/admin-silver.sock
    volumes:
      - sock_admin_silver:/var/run/challenges/admin-silver
    ports:
      - "4100:3000"
    depends_on:
      postgres:
        condition: service_healthy
      seed-admin-silver:
        condition: service_completed_successfully
    networks:
      - net_admin_silver

