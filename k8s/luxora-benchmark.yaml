apiVersion: v1
kind: Namespace
metadata:
  name: luxora
  labels:
    app.kubernetes.io/part-of: luxora-benchmark
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: luxora
  labels:
    app.kubernetes.io/part-of: luxora-benchmark
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/part-of: luxora-benchmark
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: web
          image: luxora-web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: luxora
  labels:
    app.kubernetes.io/part-of: luxora-benchmark
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rbac-silver
  namespace: luxora
  labels:
    app.kubernetes.io/part-of: luxora-benchmark
    app.kubernetes.io/component: challenge
    luxora.io/challenge: rbac
    luxora.io/difficulty: medium
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rbac-silver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rbac-silver
        app.kubernetes.io/part-of: luxora-benchmark
        app.kubernetes.io/component: challenge
        luxora.io/challenge: rbac
        luxora.io/difficulty: medium
    spec:
      containers:
        - name: rbac-silver
          image: luxora-challenge-base:latest
          imagePullPolicy: Never
          env:
            - name: PORT
              value: "3000"
            - name: PUBLIC_ROOT_ALIAS
              value: "1"
            - name: SECRET_KEY
              value: "super_secret_key_12345"
            - name: DEBUG
              value: "true"
            - name: CALLBACK_HOST_HINT
              value: "10.42.0.1"
            - name: CHALLENGE_MODE
              value: "/rbac/silver"
            - name: HTB_DIFFICULTY
              value: "MEDIUM"
            - name: CHALLENGE_POINTS
              value: "3"
            - name: FLAG
              value: "FLAG{RBAC_ACCESS_ROLE_BYPASS_HTB_MEDIUM_3PTS_034B46}"
          ports:
            - containerPort: 3000
              name: http
---
